<svg width="220" height="48" viewBox="0 0 220 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Exact brand gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#04a1e8"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Minimal icon: stylized "I" with signal waves -->
  <g>
    <!-- Core icon circle -->
    <circle cx="24" cy="24" r="18" fill="url(#brandGrad)"/>
    
    <!-- Inner "I" + signal -->
    <path d="M18 15 L18 33 M26 15 L26 33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M30 18 Q33 24 30 30" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <path d="M33 15 Q38 24 33 33" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Company name -->
  <text x="52" y="31" 
        font-family="Inter, system-ui, -apple-system, sans-serif" 
        font-size="26" 
        font-weight="700" 
        letter-spacing="-1.2"
        fill="#0f172a">Infysonic</text>
</svg>